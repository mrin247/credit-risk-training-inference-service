data:
  url: "https://archive.ics.uci.edu/ml/machine-learning-databases/statlog/german/german.data"
  target_column: "class"
  target_mapping:
    1: 0
    2: 1
  random_seed: 42
  test_size: 0.2
  column_names:
    - checking_status
    - duration
    - credit_history
    - purpose
    - credit_amount
    - savings_status
    - employment
    - installment_commitment
    - personal_status
    - other_parties
    - residence_since
    - property_magnitude
    - age
    - other_payment_plans
    - housing
    - existing_credits
    - job
    - num_dependents
    - own_telephone
    - foreign_worker
    - class

features:
  categorical:
    - checking_status
    - credit_history
    - purpose
    - savings_status
    - employment
    - personal_status
    - other_parties
    - property_magnitude
    - other_payment_plans
    - housing
    - job
    - own_telephone
    - foreign_worker
  numerical:
    - duration
    - credit_amount
    - installment_commitment
    - residence_since
    - age
    - existing_credits
    - num_dependents
  engineered:
    - name: monthly_burden
      numerator: credit_amount
      denominator: duration
    - name: debt_load_proxy
      left: installment_commitment
      right: credit_amount

model:
  type: "RandomForestClassifier"
  params:
    n_estimators: 100
    max_depth: 10
    random_state: 42
    class_weight: "balanced"

mlflow:
  tracking_uri: "http://localhost:5001"
  experiment_name: "credit-risk"
  artifact_path: "model"
  registered_model_name: "credit-risk-classifier"

